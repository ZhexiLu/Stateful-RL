# ============================================================================
# AWM-GRPO Training Configuration
# ============================================================================
# Edit this file to customize your training run.
# All fields have sensible defaults — you only need to change what matters.
# Run with:  bash run_awm_grpo.sh [--config config.yaml]
# ============================================================================

# ── Paths ──────────────────────────────────────────────────────────────────
paths:
  hf_checkpoint: ../models/Qwen3-4B
  ref_checkpoint: ../models/Qwen3-4B_torch_dist
  save_dir: ./checkpoints/awm_grpo

# ── Hardware ───────────────────────────────────────────────────────────────
hardware:
  num_gpus: 4
  tp_size: 1

# ── Training ───────────────────────────────────────────────────────────────
training:
  num_rollout: 100
  rollout_batch_size: 16        # 16 prompts × 4 samples = 64 samples/rollout
  n_samples_per_prompt: 4
  rollout_temperature: 1.0
  save_interval: 20
  eval_interval: 10

# ── Optimizer ──────────────────────────────────────────────────────────────
optimizer:
  lr: 1e-6
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.98

# ── GRPO ───────────────────────────────────────────────────────────────────
grpo:
  kl_loss_coef: 0.001
  eps_clip: 0.2
  eps_clip_high: 0.28

# ── Inference (SGLang) ─────────────────────────────────────────────────────
inference:
  max_response_length: 16384
  gpu_memory_utilization: 0.55  # H200 140GB
  server_concurrency: 12

# ── AWM Environment ───────────────────────────────────────────────────────
environment:
  max_turns: 15
  server_pool_max_servers: 32   # Higher concurrency on 4×H200 140GB
  server_startup_timeout: 120.0
  server_startup_max_retries: 2
  tool_timeout: 30.0

# ── Logging ────────────────────────────────────────────────────────────────
logging:
  wandb_enabled: true
  wandb_project: awm-grpo
  wandb_group: qwen3-4B-vanilla
