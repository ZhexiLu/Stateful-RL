# Custom config for AWM multi-turn rollout
max_turns: 15
server_startup_timeout: 30.0
server_startup_max_retries: 2
server_pool_max_servers: 16
server_pool_acquire_poll_interval: 0.05
tool_timeout: 30.0
# AWM concurrency: controls how many multi-turn rollouts run in parallel.
# Each holds an MCP server slot for the full episode, so keep this ≤ server_pool_max_servers.
# Setting to 0 means "auto" (= server_pool_max_servers).
awm_max_concurrent_samples: 0
rollout_trace_dir: /workspace/Stateful-RL/awm_grpo/logs/rollouts
live_rollout_trace_dir: /workspace/Stateful-RL/awm_grpo/logs/rollouts_live

# AWM data paths (relative to agent-world-model/)
awm_root: ../agent-world-model
awm_db_schema_path: ../agent-world-model/outputs/gen_db.jsonl
awm_sample_path: ../agent-world-model/outputs/gen_sample.jsonl
awm_verifier_path: ../agent-world-model/outputs/gen_verifier.pure_code.jsonl
awm_envs_path: ../agent-world-model/outputs/gen_envs.jsonl
awm_db_dir: ../agent-world-model/outputs/databases
